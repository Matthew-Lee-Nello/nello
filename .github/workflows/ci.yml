name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the workspace libs first so @nello/core (and the other packages that
      # publish types from dist/) resolve. Without this, dependents fail tsc with
      # "Cannot find module '@nello/core'".
      - run: pnpm -r --filter '!@nello/web' build
      - run: pnpm typecheck
